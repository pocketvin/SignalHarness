name: Bug report
description: Report a reproducible problem in SignalHarness
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please include concrete steps, environment details, and error output.
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the bug and the behavior you expected.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Include commands, prompts, or config that reliably reproduces the issue.
      placeholder: |
        1. Run `uv run signal-harness ...`
        2. Trigger ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Python version, run mode, provider/base URL if relevant, and install method.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or screenshots
      description: Paste error output, stack traces, or terminal screenshots.
      render: shell
