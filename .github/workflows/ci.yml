name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  signalharness:
    name: SignalHarness offline checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra dev --locked

      - name: Tests
        run: uv run --extra dev python -m pytest tests/signal_harness -q

      - name: Ruff
        run: uv run --extra dev ruff check src/signal_harness tests/signal_harness

      - name: Mypy
        run: uv run --extra dev mypy src/signal_harness

      - name: Build package
        run: uv build
