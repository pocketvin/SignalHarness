name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  python-tests:
    name: Python tests (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.11"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra dev --locked

      - name: SignalHarness focused tests
        run: uv run --extra dev python -m pytest tests/signal_harness -q

      - name: Mock-agent scan
        run: uv run signal-harness scan --fixture examples/signal_harness/sample_events.json --mode mock-agent

      - name: Trace summary
        run: uv run signal-harness trace

      - name: Mock-agent calibration
        run: uv run signal-harness calibrate --mode mock-agent

      - name: Build package
        run: uv build

  python-quality:
    name: Python quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra dev --locked

      - name: Ruff
        run: uv run --extra dev ruff check src/signal_harness tests/signal_harness

      - name: Mypy
        run: uv run --extra dev mypy src/signal_harness
